<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic_Tac_Toh</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Tic-Tac-Toe</h1>
    <div class="player-inputs">
      <label for="player1Input">Player 1 Name:</label>
      <input type="text" id="player1Input" placeholder="Player-1" />
      <label for="player2Input">Player 2 Name:</label>
      <input type="text" id="player2Input" placeholder="Player-2" />
    </div>
    <div id="message">Player 1's turn</div>
    <div class="board">
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
    </div>
    <button id="resetBtn">Reset Game</button>

    <script src="index.js"></script>
  </body>
</html>
